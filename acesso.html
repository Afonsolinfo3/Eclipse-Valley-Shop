<!DOCTYPE html>
<html lang="pt-br">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#050505;color:white;overflow-x:hidden;}
.gold-gradient{background:linear-gradient(to right,#d4af37,#f6e27a,#c89b3c);}
.gold-button{background:linear-gradient(to right,#d4af37,#f6e27a,#c89b3c);color:#000;font-weight:700;transition:.3s;}
.gold-button:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(212,175,55,.25);}

<body>
<section class="min-h-screen flex items-center justify-center px-6 py-20">

</div>
<div>

<p class="text-zinc-400 text-lg leading-relaxed mb-8">Seja o primeiro de todos a viver uma experiência única dentro da Eclipse Valley.</p>
<div class="space-y-4 mb-10">

<div class="bg-[#0d0d0d] gold-border rounded-2xl p-5">✔ Experiência premium</div>
</div>
<div class="flex items-center justify-between mb-8">
<div>

</div>
</div>

<script>
function buyProduct(){
const user = JSON.parse(localStorage.getItem('eclipseUser'));
if(!user){
alert('Faça login no site principal antes de comprar.');
window.location.href='index.html';
return;
}
fetch('https://discord.com/api/webhooks/1503614219851923557/feGBiiQh8ldTRlBLEuBxBIx5GOE6D6u4G2qYj0VMDCANayx8BtI5sWtihsQqjOuKFZYU',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
embeds:[{
title:'🛒 Nova Compra',
color:15844367,
fields:[
{name:'👤 Nome',value:user.name},
{name:'💬 Discord',value:user.discord},
{name:'🆔 ID Game',value:user.gameId},
{name:'📦 Produto',value:'Acesso Antecipado',inline:true},
{name:'💰 Valor',value:'R$ 49,90',inline:true}
],
footer:{text:'Eclipse Valley Store'}

})
})
window.open('https://pag.ae/81MT4gH4p','_blank');
}
